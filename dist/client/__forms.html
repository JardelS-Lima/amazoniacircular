<!DOCTYPE html>
<html lang="pt-BR">
  <body>
    <!-- Static form skeleton for Netlify Forms build-time detection. -->
    <!-- This file is never shown to users. -->
    <form name="negociacao" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="quantity" />
      <textarea name="message"></textarea>
      <input type="hidden" name="listing_id" />
      <input type="hidden" name="listing_title" />
      <input type="hidden" name="seller_company" />
    </form>

    <form name="novo-anuncio" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="empresa" />
      <input type="text" name="responsavel" />
      <input type="email" name="email" />
      <input type="tel" name="telefone" />
      <input type="tel" name="whatsapp" />
      <input type="text" name="titulo" />
      <input type="text" name="tipo_plastico" />
      <input type="text" name="condicao" />
      <input type="number" name="quantidade_kg" />
      <input type="number" name="preco_por_kg" />
      <textarea name="descricao"></textarea>
      <input type="text" name="localizacao" />
      <input type="text" name="tags" />
    </form>

    <form name="cadastro" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="tipo_usuario" />
      <input type="text" name="empresa" />
      <input type="text" name="cnpj" />
      <input type="text" name="responsavel" />
      <input type="email" name="email" />
      <input type="tel" name="telefone" />
      <input type="tel" name="whatsapp" />
      <input type="text" name="endereco" />
      <input type="text" name="bairro" />
      <input type="text" name="tipos_interesse" />
      <textarea name="descricao"></textarea>
    </form>
  </body>
</html>
