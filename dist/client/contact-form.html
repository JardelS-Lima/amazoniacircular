<!DOCTYPE html>
<html lang="pt-BR">
  <body>
    <!-- Static form skeleton for Netlify Forms build-time detection. -->
    <!-- This file is never shown to users. -->
    <form name="negociacao" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="quantity" />
      <textarea name="message"></textarea>
      <input type="hidden" name="listing_id" />
      <input type="hidden" name="listing_title" />
      <input type="hidden" name="seller_company" />
    </form>
  </body>
</html>
