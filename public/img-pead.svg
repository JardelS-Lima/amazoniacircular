<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
      <rect width="20" height="20" fill="#e8f5e9"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#c8e6c9" stroke-width="6"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#stripes)"/>
  <rect x="20" y="20" width="760" height="560" rx="16" fill="#1a6b2a" opacity="0.92"/>
  <!-- Container icon -->
  <g transform="translate(400,195)" fill="none" stroke="#e8f5e9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-40" y="-70" width="80" height="10" rx="3"/>
    <path d="M-35,-60 L-45,60 Q-46,70 -36,70 L36,70 Q46,70 45,60 L35,-60"/>
    <line x1="-10" y1="-60" x2="-10" y2="-80"/>
    <line x1="10" y1="-60" x2="10" y2="-80"/>
    <path d="M-10,-80 Q0,-90 10,-80"/>
    <line x1="-35" y1="0" x2="35" y2="0"/>
  </g>
  <!-- Recycling arrows -->
  <g transform="translate(400,340)" fill="none" stroke="#c8e6c9" stroke-width="3">
    <path d="M0,-25 L15,-5 L5,-5 L5,10 L-5,10 L-5,-5 L-15,-5 Z" transform="rotate(0) translate(0,-20)"/>
    <path d="M0,-25 L15,-5 L5,-5 L5,10 L-5,10 L-5,-5 L-15,-5 Z" transform="rotate(120) translate(0,-20)"/>
    <path d="M0,-25 L15,-5 L5,-5 L5,10 L-5,10 L-5,-5 L-15,-5 Z" transform="rotate(240) translate(0,-20)"/>
  </g>
  <!-- Text -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72" fill="#e8f5e9" letter-spacing="8">PEAD</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#c8e6c9">Aparas industriais</text>
  <rect x="20" y="20" width="760" height="560" rx="16" fill="none" stroke="#c8e6c9" stroke-width="2"/>
</svg>